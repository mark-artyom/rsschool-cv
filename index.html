<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CV HTML and CSS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <div class="resume-wrapper">
      <div class="resume-left">
        <div class="resume-image">
          <img src="img.jpg" alt="Resume-image" />
        </div>
        <div class="resume-bottom">
          <div class="resume-item resume-namerole">
            <div class="name">Artyom Kurlov</div>
            <div class="role">Web Developer (beginner)</div>
          </div>
          <div class="resume-item resume-profile">
            <div class="resume-title">About Me</div>

          </div>
          <div class="resume-item resume-address">
            <div class="resume-title">Location</div>

          </div>
          <div class="resume-item resume-contact">
            <div class="resume-title">Contact</div>

          </div>
          <div class="resume-item resume-skills">
            <div class="resume-title">Skills</div>

          </div>
        </div>
      </div>
      <div class="resume-right">
        <div class="resume-item resume-namerole">
          <div class="name">Artyom Kurlov</div>
          <div class="role">Web Developer (beginner)</div>
        </div>
        <div class="resume-item resume-education">
          <div class="resume-title">Education</div>

        </div>
        <div class="resume-item resume-experience">
          <div class="resume-title">Experience</div>

        </div>
        <div class="resume-item resmue-exemple">
          <div class="resume-title">Code Example</div>

        </div>
        <div class="resume-item resmue-language">
          <div class="resume-title">English</div>

        </div>
      </div>
    </div>
  </body>
</html>
